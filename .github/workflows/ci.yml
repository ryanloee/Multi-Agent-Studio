name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: Lint
        run: cd apps/web && pnpm lint

      - name: Type check
        run: cd apps/web && pnpm type-check

      - name: Build
        run: cd apps/web && pnpm build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: cd apps/orchestrator && poetry install --no-interaction

      - name: Run tests
        run: cd apps/orchestrator && PYTHONPATH=. poetry run pytest tests/ -v

      - name: Lint
        run: cd apps/orchestrator && poetry run ruff check app/

  agent:
    name: Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd apps/agent && pip install -e ".[dev]" 2>/dev/null || pip install pytest pytest-asyncio ruff httpx

      - name: Run tests
        run: cd apps/agent && python -m pytest tests/ -v
